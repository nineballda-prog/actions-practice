name: Hello World        # ① ワークフロー名

on:                      # ② トリガー（いつ動かすか）
  push:
    branches:
      - main
  workflow_dispatch:

jobs:                    # ③ ジョブ（何をするか）
  hello:
    runs-on: ubuntu-latest # 使い捨て用のOSを指定(必須)
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
      - name: 挨拶を表示
        run: echo "Hello, GitHub Actions!"
      - name: 日時を表示
        run: date
